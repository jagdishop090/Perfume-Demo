<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence - Premium Fragrances</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container" id="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>ESSENCE</h1>
            </div>
            
            <!-- Mode Toggle -->
            <div class="mode-toggle">
                <span class="mode-label men active" id="menLabel">MEN</span>
                <div class="toggle-switch" id="toggleSwitch">
                    <div class="toggle-slider"></div>
                </div>
                <span class="mode-label women" id="womenLabel">WOMEN</span>
            </div>
            
            <nav class="nav">
                <a href="#" class="nav-link">COLLECTION</a>
                <a href="#" class="nav-link">ABOUT</a>
                <a href="#" class="nav-link">CONTACT</a>
            </nav>
        </header>

        <!-- Hero Section -->
        <main class="hero">
            <div class="hero-content">
                <div class="hero-text">
                    <h2 class="hero-title" id="heroTitle">SOPHISTICATED MASCULINITY</h2>
                    <p class="hero-subtitle" id="heroSubtitle">Discover fragrances that define your presence</p>
                    <button class="cta-button" id="ctaButton">EXPLORE COLLECTION</button>
                </div>
                
                <div class="hero-image">
                    <div class="perfume-bottle" id="perfumeBottle">
                        <div class="bottle-shadow"></div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Features -->
        <section class="features">
            <div class="feature-item">
                <h3>PREMIUM QUALITY</h3>
                <p>Crafted with the finest ingredients</p>
            </div>
            <div class="feature-item">
                <h3>LONG LASTING</h3>
                <p>Exceptional longevity and projection</p>
            </div>
            <div class="feature-item">
                <h3>EXCLUSIVE BLENDS</h3>
                <p>Unique compositions for discerning tastes</p>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
