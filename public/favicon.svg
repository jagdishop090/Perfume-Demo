<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <circle cx="32" cy="32" r="32" fill="url(#gradient)"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3A2D28;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A48374;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CBAD8D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Perfume bottle design -->
  <!-- Bottle cap -->
  <rect x="26" y="12" width="12" height="4" rx="1" fill="#F1EDE6"/>
  
  <!-- Bottle neck -->
  <rect x="28" y="16" width="8" height="6" fill="#F1EDE6" opacity="0.9"/>
  
  <!-- Main bottle body -->
  <path d="M 24 22 L 24 48 Q 24 50 26 50 L 38 50 Q 40 50 40 48 L 40 22 Z" fill="#F1EDE6" opacity="0.95"/>
  
  <!-- Bottle highlight -->
  <path d="M 26 24 L 26 46 Q 26 47 27 47 L 29 47 L 29 24 Z" fill="#FFFFFF" opacity="0.3"/>
  
  <!-- Decorative line -->
  <line x1="24" y1="30" x2="40" y2="30" stroke="#3A2D28" stroke-width="0.5" opacity="0.3"/>
  
  <!-- Letter E -->
  <text x="32" y="40" font-family="serif" font-size="14" font-weight="bold" fill="#3A2D28" text-anchor="middle" opacity="0.6">E</text>
</svg>